# 每游戏一个 workflow,iOS 流水线全部走 &ios_* 模板;新游戏只需:
#   1. 该游戏目录放 package.json + capacitor.config.json + resources/(icon.png 1024 + splash.png 2732)
#   2. 下面 workflows 里加一段,填 4 个 vars(GAME_DIR/BUNDLE_ID/APP_STORE_APP_ID/GAD_APP_ID)
#   3. Bundle ID 先 API 注册,ASC 建 App 记录后回填数字 Apple ID
# 所有脚本用 $GAME_DIR 定位游戏目录;签名共用账号级 ASC API Key + ios_signing 组私钥。

definitions:
  ios_env: &ios_env
    groups:
      - ios_signing                        # 含 CERTIFICATE_PRIVATE_KEY(Secure),app 级变量
    node: 20                               # Capacitor 6(Cap8 才需 22)
    xcode: latest                          # 苹果强制最新 SDK 才收,别钉旧版
    cocoapods: default
  ios_scripts: &ios_scripts
    - name: npm 依赖
      script: |
        set -e
        cd $GAME_DIR
        npm ci || npm install
    - name: 组装 www(monorepo → webDir)
      script: |
        set -e
        cd $GAME_DIR
        node ../../tools/build-www.cjs
    - name: 生成 iOS 工程 + pin UMP 2.x
      script: |
        set -e
        cd $GAME_DIR
        npx cap add ios
        npx cap sync ios
        # @capacitor-community/admob v6 用旧 UMP API,UMP 3.x 全重命名 → pin 回 2.3.x(与 2048 同修法)
        perl -i -pe "s/(target 'App' do)/\$1\n  pod 'GoogleUserMessagingPlatform', '~> 2.3'/" ios/App/Podfile
        grep -n GoogleUserMessagingPlatform ios/App/Podfile || true
        cd ios/App && rm -f Podfile.lock && pod install && cd ../..
    - name: 图标 + 启动屏(源图在 resources/)
      script: |
        set -e
        cd $GAME_DIR
        npx @capacitor/assets generate --ios --assetPath resources
    - name: 注入 Info.plist(AdMob + ATT + SKAdNetwork + 免出口合规)
      script: |
        set -e
        cd $GAME_DIR
        PLIST=ios/App/App/Info.plist
        plutil -replace ITSAppUsesNonExemptEncryption -bool false "$PLIST"
        plutil -replace GADApplicationIdentifier -string "$GAD_APP_ID" "$PLIST"
        plutil -replace NSUserTrackingUsageDescription -string "Your device identifier is used to deliver and measure more relevant ads." "$PLIST"
        # SKAdNetwork 归因清单(Google 官方 50 家,tools/skadnetworks.json 为唯一事实源)
        SKAD=$(node -e "console.log(JSON.stringify(require('../../tools/skadnetworks.json').map(i=>({SKAdNetworkIdentifier:i}))))")
        plutil -replace SKAdNetworkItems -json "$SKAD" "$PLIST"
        plutil -p "$PLIST" | grep -cE "skadnetwork" || true
        plutil -p "$PLIST" | grep -E "GADApplicationIdentifier|NSUserTrackingUsageDescription|ITSApp" || true
    - name: 签名(建证书 + 描述文件)
      script: |
        set -e
        cd $GAME_DIR
        keychain initialize
        app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
        keychain add-certificates
        xcode-project use-profiles
    - name: 递增构建号
      script: |
        set -e
        cd $GAME_DIR/ios/App
        LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0)
        agvtool new-version -all $(($LATEST + 1))
    - name: 打 IPA
      script: |
        set -e
        cd $GAME_DIR
        if [ -d ios/App/App.xcworkspace ]; then
          xcode-project build-ipa --workspace ios/App/App.xcworkspace --scheme App
        else
          xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App
        fi
  ios_artifacts: &ios_artifacts
    - games/*/build/ios/ipa/*.ipa
    - build/ios/ipa/*.ipa
    - /tmp/xcodebuild_logs/*.log
  ios_publishing: &ios_publishing
    app_store_connect:
      auth: integration
      submit_to_testflight: true
    email:
      recipients:
        - tangzy09@gmail.com
      notify:
        success: true
        failure: true

workflows:
  mines-ios-testflight:
    name: Dungeon Sweep iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: ASC API Key        # 与 Codemagic 后台 ASC API key 集成同名(一字不差)
    environment:
      <<: *ios_env
      vars:
        GAME_DIR: "games/minesweeper"
        BUNDLE_ID: "com.aispeeds.dungeonsweep"
        APP_STORE_APP_ID: "6789722105"
        GAD_APP_ID: "ca-app-pub-2141208066469648~9504869782"
    scripts: *ios_scripts
    artifacts: *ios_artifacts
    publishing: *ios_publishing

  snake-ios-testflight:
    name: Angel Snake iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: ASC API Key        # 同上,账号级 ASC API Key 复用
    environment:
      <<: *ios_env
      vars:
        GAME_DIR: "games/snake"
        BUNDLE_ID: "com.aispeeds.angelsnake"
        APP_STORE_APP_ID: "6789757716"       # ASC「Snake Angel: Retro Arcade」数字 Apple ID
        GAD_APP_ID: "ca-app-pub-2141208066469648~2322595323"   # Angel Snake 专属 AdMob App ID(~号)
    scripts: *ios_scripts
    artifacts: *ios_artifacts
    publishing: *ios_publishing

  abyss-ios-testflight:
    name: 2048 Shooter Fish Merge iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: ASC API Key        # 同上,账号级 ASC API Key 复用
    environment:
      <<: *ios_env
      vars:
        GAME_DIR: "games/abyssshoot"
        BUNDLE_ID: "com.aispeeds.fishshooter"
        APP_STORE_APP_ID: "TODO"             # ⚠ ASC 建完 App 记录后回填数字 Apple ID
        GAD_APP_ID: "TODO"                   # ⚠ AdMob 建完 app 后回填(~号那个;绝不复用他游戏的)
    scripts: *ios_scripts
    artifacts: *ios_artifacts
    publishing: *ios_publishing
