        GAD_APP_ID: "ca-app-pub-2141208066469648~6813744374"   # Cube Blast 专属 AdMob App ID(~ 号)
    scripts: *ios_scripts
    artifacts: *ios_artifacts
    publishing: *ios_publishing

  solitaire-ios-testflight:
    name: Solitaire Klondike FreeCell iOS -> TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
