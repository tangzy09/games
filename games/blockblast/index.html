<script>
  // 十语（引擎默认集）。加语言 = 加一个 locales/<lang>.json + 在这里加一项，**零改代码**
  // —— 因为从第一行起就零硬编码文案（全走 T('key')）。
  window.GAME_CONFIG = {
    id: 'blockblast',
    languages: ['en', 'zh-CN', 'es', 'hi', 'bn', 'pt-BR', 'ru', 'ja', 'pa', 'de'],

    // ⚠ 广告位:**本游戏专属**(AdMob app「Cube Blast」,App ID ~6813744374)。
    //    已核对不与 mines/snake/abyss 的任何一个广告位重复 —— 复用他游戏的位会污染两边的数据。
    //    ⚠ 两个 `/` 号 ID 形状一样、不含类型信息,**别填反**:
    //       rewarded = /1692445484   interstitial = /1094976854
    adUnits: {
      rewarded:     { ios: 'ca-app-pub-2141208066469648/1692445484' },
      interstitial: { ios: 'ca-app-pub-2141208066469648/1094976854' },
    },
  };
</script>
