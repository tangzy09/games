  // —— 因为从第一行起就零硬编码文案（全走 T('key')）。
  window.GAME_CONFIG = {
    id: 'blockblast',
    languages: ['en', 'zh-CN', 'es', 'hi', 'bn', 'pt-BR', 'ru', 'ja', 'pa', 'de'],

    // ⚠ 广告位:**本游戏专属,绝不复用他游戏的**(引擎契约)。
    //    没填 ⇒ 引擎自动用 Google 测试位 + initializeForTesting(安全;
    //    ⛔ 反过来「拿测试位跑真实流量」= 封号)。
    //    TODO(上线前): 在 AdMob 后台建 iOS app(Bundle com.aispeeds.cubeblast)+ 两个广告位,
    //    把 `/` 号的广告位 ID 填进来;`~` 号的 App ID 填进 codemagic 的 GAD_APP_ID。
    // adUnits: {
    //   rewarded:     { ios: 'ca-app-pub-XXXX/XXXX' },
    //   interstitial: { ios: 'ca-app-pub-XXXX/XXXX' },
    // },
  };
</script>
